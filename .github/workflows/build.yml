name: Build APK Game

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
    - name: 1. Ambil Source Code
      uses: actions/checkout@v4

    - name: 2. Setup Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 4. Cache Buildozer
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.gradle
        key: buildozer-pygame-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          buildozer-pygame-${{ runner.os }}-

    - name: 5. Install Pendukung Utama
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip python3-pip \
          cmake libffi-dev libssl-dev \
          libtool-bin autoconf automake \
          pkg-config libltdl-dev \
          g++-multilib lib32z1 \
          libsdl2-dev libsdl2-image-dev \
          libsdl2-mixer-dev libsdl2-ttf-dev
        pip install --upgrade \
          buildozer \
          "cython>=0.29.36" \
          virtualenv

    - name: 6. Install Android cmdline-tools
      run: |
        if [ ! -f "$HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager" ]; then
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip \
               -O cmdtools.zip
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/cmdline-tools
          unzip -q cmdtools.zip -d /tmp/cmdtools-tmp
          mv /tmp/cmdtools-tmp/cmdline-tools \
             $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest
        fi
        echo "$HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin" \
             >> $GITHUB_PATH
        echo "$HOME/.buildozer/android/platform/android-sdk/platform-tools" \
             >> $GITHUB_PATH

    - name: 7. Accept Lisensi & Install SDK
      env:
        ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
      run: |
        SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
        yes | $SDKMANAGER --licenses
        $SDKMANAGER \
          "platform-tools" \
          "platforms;android-33" \
          "build-tools;33.0.2" \
          "ndk;25.2.9519653"

    - name: 8. Build APK
      env:
        ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
        ANDROID_NDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk/ndk/25.2.9519653
        ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
      run: |
        unset ANDROID_NDK_HOME || true
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/tools/bin
        ln -sf \
          $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager \
          $HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
        
        # Pastikan Cython aman
        pip install --upgrade "cython<3.0.0" virtualenv
        
        # MANTRA PENJINAK: Kunci sistem agar tidak merakit Python 3.14 yang berat
        export P4A_RELEASE_VERSION=v2024.01.21
        
        # Jalankan build
        buildozer -v android debug




    - name: 9. Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Game-APK-Siap-Instal
        # Trik bintang ganda: mencari file .apk di folder mana pun tanpa terkecuali
        path: "**/bin/*.apk"
        # Jika tetap tidak ketemu, setidaknya prosesnya akan tertulis eror/gagal (bukan pura-pura sukses)
        if-no-files-found: error

    - name: 9b. Upload Log jika Gagal
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
